name: Bem-vindo

# Dispara no primeiro push após a criação do repositório a partir do template.
# Cria a issue de acompanhamento, publica o setup e o Passo 1, habilita o
# workflow do Passo 1 e se autodesabilita (evita re-disparar nos merges
# posteriores para a main).

on:
  push:
    branches:
      - main

permissions:
  contents: write
  actions: write
  issues: write

env:
  STEP_0_FILE: ".github/steps/0-welcome.md"
  STEP_1_FILE: ".github/steps/1-planning.md"

jobs:
  start_exercise:
    if: |
      !github.event.repository.is_template
    name: Start Exercise
    uses: skills/exercise-toolkit/.github/workflows/start-exercise.yml@v0.8.1
    with:
      exercise-title: "Document Management System com GitHub Copilot"
      intro-message: "Bem-vindo ao treinamento de GitHub Copilot (Agent Mode e Coding Agent). Você vai construir um sistema de gestão de documentos (o Document Management System, DMS) completo. Acompanhe cada passo por esta issue. Ao concluir o trabalho esperado e fazer push, a automação valida seu progresso e publica o próximo passo aqui."

  post_next_step_content:
    name: Post next step content
    runs-on: ubuntu-latest
    needs: [start_exercise]
    env:
      ISSUE_NUMBER: ${{ needs.start_exercise.outputs.issue-number }}
      ISSUE_REPOSITORY: ${{ github.repository }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Get response templates
        uses: actions/checkout@v4
        with:
          repository: skills/exercise-toolkit
          path: exercise-toolkit
          ref: v0.8.1

      - name: Create comment - setup
        uses: GrantBirki/comment@v2.1.1
        with:
          repository: ${{ env.ISSUE_REPOSITORY }}
          issue-number: ${{ env.ISSUE_NUMBER }}
          file: ${{ env.STEP_0_FILE }}
          vars: |
            login: ${{ github.actor }}
            full_repo_name: ${{ github.repository }}

      - name: Create comment - add step content
        uses: GrantBirki/comment@v2.1.1
        with:
          repository: ${{ env.ISSUE_REPOSITORY }}
          issue-number: ${{ env.ISSUE_NUMBER }}
          file: ${{ env.STEP_1_FILE }}
          vars: |
            login: ${{ github.actor }}
            full_repo_name: ${{ github.repository }}

      - name: Create comment - watching for progress
        uses: GrantBirki/comment@v2.1.1
        with:
          repository: ${{ env.ISSUE_REPOSITORY }}
          issue-number: ${{ env.ISSUE_NUMBER }}
          file: exercise-toolkit/markdown-templates/step-feedback/watching-for-progress.md

      - name: Disable current workflow and enable next one
        run: |
          gh workflow enable "1-planning.yml"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
